name: CI

on:
  push:
    branches-ignore: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Build packages
        run: npm run build -w packages/core -w packages/ddl-parser

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test
